name: CI

# Runs the Go test suite on every push and pull request. Windows is the
# primary target platform and the only one where the Wails main package
# compiles without extra system libraries (no cgo needed).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The main package embeds frontend/dist, so the frontend must build
      # before anything in package main compiles.
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
