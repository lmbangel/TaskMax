name: Release

# Builds TaskMax for Windows, macOS and Linux whenever a version tag is
# pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`) and attaches the
# artifacts to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  WAILS_VERSION: v2.13.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          # choco updates the machine PATH, but job steps keep the PATH computed
          # at job start — expose makensis to the build step explicitly.
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS'
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS\Bin'
      - name: Build portable exe + NSIS installer
        run: wails build -platform windows/amd64 -nsis
      - name: Stage artifacts
        shell: pwsh
        run: |
          Get-ChildItem build/bin
          Copy-Item build/bin/TaskMax.exe TaskMax-windows-amd64-portable.exe
          Copy-Item build/bin/TaskMax-amd64-installer.exe TaskMax-windows-amd64-installer.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            TaskMax-windows-amd64-portable.exe
            TaskMax-windows-amd64-installer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build universal .app (Intel + Apple Silicon)
        run: wails build -platform darwin/universal
      - name: Zip app bundle
        run: ditto -c -k --keepParent build/bin/TaskMax.app TaskMax-macos-universal.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: TaskMax-macos-universal.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install GTK + WebKit
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41
      - name: Stage artifact
        run: tar -czf TaskMax-linux-amd64.tar.gz -C build/bin TaskMax
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: TaskMax-linux-amd64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            TaskMax-windows-amd64-installer.exe
            TaskMax-windows-amd64-portable.exe
            TaskMax-macos-universal.zip
            TaskMax-linux-amd64.tar.gz
